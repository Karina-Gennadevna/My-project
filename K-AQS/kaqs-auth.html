<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K-A-Q-S™ — Войти</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #121212;
      --surface:  #1F1F1F;
      --border:   #2A2A2A;
      --border2:  #383838;
      --text:     #E6E6E6;
      --text2:    #B8B8B8;
      --muted:    #707070;
      --accent:   #1F5F5B;
      --accent-l: #2A7A75;
      --error:    #EF4444;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: .75rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent-l);
    }

    /* Main */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .form-wrap {
      width: 100%;
      max-width: 340px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .tab {
      padding: 0 0 14px;
      margin-right: 24px;
      font-size: .85rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .2s, border-color .2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }

    .tab.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    /* Form */
    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: .6rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: .88rem;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .2s;
    }

    input::placeholder { color: var(--muted); }
    input:focus { border-color: var(--accent); }

    .error-msg {
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: .82rem;
      color: var(--error);
      margin-bottom: 20px;
      display: none;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      font-weight: 500;
      font-size: .88rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: background .2s, transform .15s;
      margin-top: 4px;
    }
    .btn-submit:hover { background: var(--accent-l); }
    .btn-submit:active { transform: scale(.98); }

    .form-footer {
      text-align: center;
      margin-top: 24px;
      font-size: .78rem;
      color: var(--muted);
    }

    .form-footer button {
      color: var(--text2);
      background: none;
      border: none;
      cursor: pointer;
      font-size: .78rem;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .form-footer button:hover { color: var(--text); }
  </style>
</head>
<body>

  <header>
    <a href="kaqs-landing.html" class="logo">K-A-Q-S™</a>
  </header>

  <main>
    <div class="form-wrap">

      <div class="tabs">
        <button class="tab active" onclick="switchTab('login', this)">Войти</button>
        <button class="tab" onclick="switchTab('register', this)">Создать аккаунт</button>
      </div>

      <div id="error-msg" class="error-msg"></div>

      <form id="auth-form" onsubmit="handleSubmit(event)">
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@company.com" required autocomplete="email">
        </div>

        <div class="field">
          <label>Пароль</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">Войти</button>
      </form>

      <p class="form-footer" id="form-footer">
        Ещё нет аккаунта?
        <button onclick="switchTabByName('register')">Зарегистрироваться</button>
      </p>

    </div>
  </main>

  <script>
    let currentMode = 'login'

    function switchTab(mode, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
      el.classList.add('active')
      currentMode = mode
      document.getElementById('submit-btn').textContent = mode === 'login' ? 'Войти' : 'Создать аккаунт'
      document.getElementById('form-footer').innerHTML = mode === 'login'
        ? 'Ещё нет аккаунта? <button onclick="switchTabByName(\'register\')">Зарегистрироваться</button>'
        : 'Уже есть аккаунт? <button onclick="switchTabByName(\'login\')">Войти</button>'
      document.getElementById('password').placeholder = mode === 'register' ? 'Не менее 8 символов' : '••••••••'
      document.getElementById('error-msg').style.display = 'none'
    }

    function switchTabByName(mode) {
      const tabs = document.querySelectorAll('.tab')
      switchTab(mode, tabs[mode === 'login' ? 0 : 1])
    }

    function handleSubmit(e) {
      e.preventDefault()
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const errEl = document.getElementById('error-msg')
      const btn = document.getElementById('submit-btn')

      errEl.style.display = 'none'

      // Demo: simulate validation
      if (currentMode === 'register' && password.length < 8) {
        errEl.textContent = 'Пароль должен содержать не менее 8 символов'
        errEl.style.display = 'block'
        return
      }

      btn.textContent = 'Загрузка...'
      btn.disabled = true

      // Simulate async → redirect to dashboard
      setTimeout(() => {
        window.location.href = 'kaqs-dashboard.html'
      }, 800)
    }
  </script>

</body>
</html>
