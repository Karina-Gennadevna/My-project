<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заявка принята — K-AQS™</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080A0C;
      --bg2:     #0F1215;
      --bg3:     #161A1F;
      --border:  #1E2530;
      --text:    #F1F5F9;
      --text2:   #94A3B8;
      --muted:   #475569;
      --accent:  #F97316;
      --accent2: #FB923C;
      --green:   #22C55E;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    .nav-logo span { color: var(--accent); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .wrap {
      width: 100%;
      max-width: 520px;
      text-align: center;
    }

    /* Check icon */
    .check-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(34,197,94,.12);
      border: 1px solid rgba(34,197,94,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: pop .4s cubic-bezier(.34,1.56,.64,1) both;
    }
    .check-icon svg {
      width: 28px;
      height: 28px;
      stroke: var(--green);
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--green);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(22px, 4vw, 30px);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .sub {
      font-size: 15px;
      color: var(--text2);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    /* What's next */
    .next-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
      text-align: left;
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 40px;
      text-align: left;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
    }
    .step-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      min-width: 20px;
      padding-top: 1px;
    }
    .step-body strong {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .step-body span {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.5;
    }

    /* Actions */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    .btn-dashboard {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      width: 100%;
      justify-content: center;
      transition: background .2s;
    }
    .btn-dashboard:hover { background: var(--accent2); }

    .btn-tg {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      background: transparent;
      color: var(--text2);
      font-size: 14px;
      border-radius: 8px;
      text-decoration: none;
      width: 100%;
      justify-content: center;
      border: 1px solid var(--border);
      transition: border-color .2s, color .2s;
    }
    .btn-tg:hover { border-color: var(--text2); color: var(--text); }
    .btn-tg svg { width: 16px; height: 16px; flex-shrink: 0; }

    @media (max-width: 480px) {
      nav { padding: 16px 20px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">K-<span>A</span>QS<sup>™</sup></a>
</nav>

<main>
  <div class="wrap">

    <div class="check-icon">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <p class="label">// Заявка принята</p>
    <h1 id="title">Оплата прошла успешно</h1>
    <p class="sub" id="subtitle">Мы получили вашу заявку и скоро свяжемся с вами.</p>

    <p class="next-title">// Что дальше</p>
    <div class="steps" id="steps">
      <!-- заполняется скриптом -->
    </div>

    <div class="actions">
      <a href="kaqs-dashboard.html" class="btn-dashboard">Открыть личный кабинет →</a>
      <a href="https://t.me/KarinaGen" target="_blank" rel="noopener" class="btn-tg">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.93 6.77-1.69 7.94c-.12.55-.45.68-.91.42l-2.52-1.86-1.22 1.17c-.13.13-.25.25-.51.25l.18-2.56 4.63-4.18c.2-.18-.05-.28-.31-.1L7.6 14.47l-2.45-.77c-.53-.17-.54-.53.11-.78l9.57-3.69c.44-.16.83.11.1.54z"/>
        </svg>
        Написать в Telegram @KarinaGen
      </a>
    </div>

  </div>
</main>

<script>
  const TARIFF_STEPS = {
    'roadmap-basic': [
      { n: '01', title: 'Подтверждение', text: 'В течение 24 часов свяжемся и подтвердим получение оплаты.' },
      { n: '02', title: 'Подготовка Roadmap', text: 'Анализируем вашу диагностику и готовим персональный план. 3 рабочих дня.' },
      { n: '03', title: 'Получаете PDF', text: 'Отправим Roadmap на ваш email или в Telegram.' },
    ],
    'roadmap-pro': [
      { n: '01', title: 'Подтверждение', text: 'В течение 24 часов свяжемся и подтвердим получение оплаты.' },
      { n: '02', title: 'Подготовка Roadmap', text: 'Анализируем диагностику и готовим план с шаблонами и чеклистами. 3 рабочих дня.' },
      { n: '03', title: 'Получаете PDF + материалы', text: 'Roadmap, шаблоны и таблицы — на email или в Telegram.' },
    ],
    'combo': [
      { n: '01', title: 'Подтверждение', text: 'В течение 24 часов свяжемся и подтвердим получение оплаты.' },
      { n: '02', title: 'Подготовка Roadmap', text: 'Готовим расширенный план — 3 рабочих дня.' },
      { n: '03', title: 'Доступ к платформе', text: 'После доставки Roadmap откроем доступ к платформе K-AQS на 1 месяц.' },
    ],
    'platform': [
      { n: '01', title: 'Подтверждение', text: 'В течение 24 часов свяжемся и подтвердим оплату.' },
      { n: '02', title: 'Доступ к платформе', text: 'Откроем доступ в течение 1 рабочего дня. Отправим инструкцию.' },
      { n: '03', title: 'Начинайте работу', text: 'Дашборд, задачи и AI-агент уже ждут вас.' },
    ],
    'platform-pro': [
      { n: '01', title: 'Подтверждение', text: 'В течение 24 часов свяжемся и подтвердим оплату.' },
      { n: '02', title: 'Доступ к платформе', text: 'Откроем доступ в течение 1 рабочего дня.' },
      { n: '03', title: 'Первый разбор', text: 'Запишемся на консультацию — договоримся об удобном времени.' },
    ],
  }

  const DEFAULT_STEPS = [
    { n: '01', title: 'Подтверждение', text: 'В течение 24 часов свяжемся с вами.' },
    { n: '02', title: 'Следующий шаг', text: 'Обсудим детали и подготовим всё необходимое.' },
    { n: '03', title: 'Результат', text: 'Доставим в оговорённые сроки.' },
  ]

  const key = new URLSearchParams(window.location.search).get('tariff')
  const steps = TARIFF_STEPS[key] || DEFAULT_STEPS

  if (key && TARIFF_STEPS[key]) {
    const names = {
      'roadmap-basic': 'Roadmap Базовый',
      'roadmap-pro': 'Roadmap Расширенный',
      'combo': 'Комбо',
      'platform': 'Платформа',
      'platform-pro': 'Платформа + Консультант',
    }
    document.getElementById('title').textContent = '«' + names[key] + '» — оформлено'
  }

  const container = document.getElementById('steps')
  steps.forEach(s => {
    const el = document.createElement('div')
    el.className = 'step'
    el.innerHTML = `<span class="step-num">${s.n}</span><div class="step-body"><strong>${s.title}</strong><span>${s.text}</span></div>`
    container.appendChild(el)
  })
</script>

</body>
</html>
