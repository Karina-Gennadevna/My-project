<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K-AQS — Платформа управляемости</title>
  <meta name="description" content="Платформа управляемости бизнеса. Ваш индекс, проблемы, план и задачи — в одном месте.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0D0F11;
      --bg2:         #13161A;
      --bg3:         #191D22;
      --bg4:         #1E2329;
      --bg5:         #242B34;
      --border:      rgba(255,255,255,0.06);
      --border2:     rgba(255,255,255,0.11);
      --border3:     rgba(255,255,255,0.16);
      --text:        #F1F5F9;
      --text2:       #CBD5E1;
      --text3:       #94A3B8;
      --text4:       #64748B;
      --text5:       #475569;
      --accent:      #6366F1;
      --accent2:     #818CF8;
      --accent3:     #A5B4FC;
      --accent-dim:  rgba(99,102,241,0.10);
      --accent-dim2: rgba(99,102,241,0.18);
      --accent-dim3: rgba(99,102,241,0.28);
      --green:       #22C55E;
      --green-dim:   rgba(34,197,94,0.10);
      --green-dim2:  rgba(34,197,94,0.18);
      --yellow:      #EAB308;
      --yellow-dim:  rgba(234,179,8,0.10);
      --yellow-dim2: rgba(234,179,8,0.18);
      --red:         #EF4444;
      --red-dim:     rgba(239,68,68,0.10);
      --red-dim2:    rgba(239,68,68,0.18);
      --blue:        #60A5FA;
      --blue-dim:    rgba(96,165,250,0.10);
      --sidebar-w:   252px;
      --topbar-h:    62px;
      --r:           12px;
      --r-sm:        8px;
      --r-lg:        16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── APP LAYOUT ── */
    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      z-index: 110;
      transition: transform .3s cubic-bezier(.4,0,.2,1);
    }

    .sidebar-logo {
      padding: 20px 18px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 12px;
      color: #fff;
      letter-spacing: -.5px;
      flex-shrink: 0;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.3px;
      line-height: 1.2;
    }

    .logo-tagline {
      font-size: 10px;
      color: var(--text5);
      font-weight: 500;
      letter-spacing: .4px;
      text-transform: uppercase;
    }

    .sidebar-user {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .suser-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .suser-meta {
      font-size: 11px;
      color: var(--text5);
    }

    .suser-index {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding: 8px 10px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-dim2);
      border-radius: 8px;
    }

    .suser-index-label {
      font-size: 11px;
      color: var(--text3);
    }

    .suser-index-val {
      font-size: 14px;
      font-weight: 800;
      color: var(--accent);
    }

    .sidebar-nav {
      flex: 1;
      padding: 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow-y: auto;
    }

    .nav-group-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text5);
      text-transform: uppercase;
      letter-spacing: .7px;
      padding: 10px 8px 5px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 10px;
      border-radius: var(--r-sm);
      cursor: pointer;
      color: var(--text4);
      font-size: 13px;
      font-weight: 500;
      transition: all .15s ease;
      border: 1px solid transparent;
      position: relative;
      user-select: none;
    }

    .nav-item:hover {
      background: var(--bg4);
      color: var(--text2);
    }

    .nav-item.active {
      background: var(--accent-dim);
      border-color: var(--accent-dim2);
      color: var(--accent);
    }

    .nav-item .ni {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
      opacity: .6;
    }

    .nav-item.active .ni { opacity: 1; }

    .nav-badge {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
    }

    .nav-badge.green {
      background: var(--green);
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOPBAR ── */
    .topbar {
      height: var(--topbar-h);
      min-height: var(--topbar-h);
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 14px;
      flex-shrink: 0;
    }

    .hamburger {
      display: none;
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      padding: 4px;
    }

    .topbar-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
    }

    .topbar-date {
      font-size: 12px;
      color: var(--text5);
    }

    .topbar-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1.5px solid var(--accent-dim2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
    }

    /* ── PAGES ── */
    .page { display: none; }
    .page.active {
      display: block;
      animation: fadeUp .25s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── OVERLAY ── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 109;
    }

    /* ══════════════════════════════════════
       COMPONENTS
    ══════════════════════════════════════ */

    /* CARD */
    .card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 22px;
      transition: border-color .2s;
    }

    .card:hover { border-color: var(--border2); }
    .card-sm { padding: 16px; }
    .card-xs { padding: 12px 14px; }

    /* SECTION HEADER */
    .sec-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }

    .sec-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.3px;
    }

    .sec-sub {
      font-size: 12px;
      color: var(--text5);
      margin-top: 3px;
    }

    /* PAGE HEADER */
    .pg-head {
      margin-bottom: 26px;
    }

    .pg-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.4px;
      margin-bottom: 5px;
    }

    .pg-sub {
      font-size: 13px;
      color: var(--text4);
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: var(--r-sm);
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s ease;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7A5CFF, #5B8CFF);
      color: #fff;
      box-shadow: 0 0 0 0 rgba(122,92,255,0);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #8B6FFF, #6B9CFF);
      box-shadow: 0 0 20px rgba(122,92,255,.3);
      transform: translateY(-1px);
    }

    .btn-primary:active { transform: scale(.98); }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text2);
    }

    .btn-outline:hover {
      background: var(--bg4);
      border-color: var(--border3);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text3);
      padding: 7px 14px;
    }

    .btn-ghost:hover {
      background: var(--bg4);
      color: var(--text2);
    }

    .btn-sm {
      padding: 6px 13px;
      font-size: 12px;
    }

    /* BADGES */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      line-height: 1.6;
    }

    .b-red    { background: var(--red-dim);    color: var(--red);    }
    .b-yellow { background: var(--yellow-dim); color: var(--yellow); }
    .b-green  { background: var(--green-dim);  color: var(--green);  }
    .b-blue   { background: var(--blue-dim);   color: var(--blue);   }
    .b-accent { background: var(--accent-dim); color: var(--accent); }
    .b-gray   { background: var(--bg5);        color: var(--text4);  }

    /* LEVEL PILL */
    .level-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 11px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .lp-critical { background: var(--red-dim2);    color: var(--red);    }
    .lp-weak     { background: var(--yellow-dim2); color: var(--yellow); }
    .lp-medium   { background: var(--blue-dim);    color: var(--blue);   }
    .lp-good     { background: var(--green-dim2);  color: var(--green);  }

    /* PROGRESS BAR */
    .pbar-wrap { margin-top: 8px; }

    .pbar-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .pbar-track {
      height: 6px;
      background: var(--bg5);
      border-radius: 3px;
      overflow: hidden;
    }

    .pbar-track-md { height: 8px; }

    .pbar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 1s cubic-bezier(.4,0,.2,1);
    }

    .pf-red    { background: var(--red); }
    .pf-yellow { background: var(--yellow); }
    .pf-blue   { background: var(--blue); }
    .pf-green  { background: var(--green); }
    .pf-accent { background: var(--accent); }

    /* GRID UTILS */
    .g2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
    .g3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
    .g5 { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; }
    .stack { display: flex; flex-direction: column; gap: 12px; }
    .row { display: flex; align-items: center; gap: 10px; }
    .flex-1 { flex: 1; }

    /* SPACERS */
    .mt8  { margin-top: 8px; }
    .mt12 { margin-top: 12px; }
    .mt16 { margin-top: 16px; }
    .mt20 { margin-top: 20px; }
    .mt24 { margin-top: 24px; }
    .mb16 { margin-bottom: 16px; }
    .mb24 { margin-bottom: 24px; }

    /* DIVIDER */
    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text5); }

    /* ══════════════════════════════════════
       DASHBOARD
    ══════════════════════════════════════ */

    .index-hero {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 28px 32px;
      display: flex;
      align-items: center;
      gap: 28px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .index-hero::before {
      content: '';
      position: absolute;
      right: -60px;
      top: -60px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(249,115,22,.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .ih-circle {
      position: relative;
      flex-shrink: 0;
      width: 104px;
      height: 104px;
    }

    .ih-circle-val {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .ih-num {
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -1px;
    }

    .ih-max {
      font-size: 11px;
      color: var(--text5);
      font-weight: 500;
    }

    .ih-info { flex: 1; }

    .ih-info h2 {
      font-size: 21px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.4px;
      margin-bottom: 8px;
      margin-top: 8px;
    }

    .ih-info p {
      font-size: 13px;
      color: var(--text3);
      line-height: 1.75;
      max-width: 500px;
    }

    .ih-actions { flex-shrink: 0; }

    /* MINI SCORE CARDS */
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(5,1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    .mini-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 12px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
    }

    .mini-card:hover {
      border-color: var(--border2);
      background: var(--bg4);
      transform: translateY(-2px);
    }

    .mc-icon { font-size: 20px; margin-bottom: 7px; }
    .mc-name { font-size: 11px; color: var(--text5); margin-bottom: 5px; }
    .mc-val  { font-size: 21px; font-weight: 800; }

    /* LOSSES BLOCK */
    .losses-block {
      background: #2A1212;
      border: 1px solid rgba(255,107,107,.15);
      border-radius: var(--r);
      padding: 22px;
    }

    .losses-main-line {
      font-size: 22px;
      font-weight: 800;
      color: #E07070;
      letter-spacing: -.5px;
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .losses-monthly {
      font-size: 13px;
      font-weight: 600;
      color: rgba(224,112,112,.6);
      margin-bottom: 16px;
    }

    .losses-divider {
      height: 1px;
      background: rgba(224,112,112,.1);
      margin-bottom: 14px;
    }

    .losses-reasons-label {
      font-size: 12px;
      font-weight: 500;
      color: rgba(203,213,225,.5);
      margin-bottom: 10px;
    }

    .losses-reason {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 13px;
      color: #94A3B8;
      margin-bottom: 7px;
    }

    .losses-reason::before {
      content: '';
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(224,112,112,.45);
      flex-shrink: 0;
    }

    /* PROBLEM PREVIEW CARD */
    .prob-prev {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      cursor: pointer;
      transition: all .2s;
    }

    .prob-prev:hover {
      border-color: var(--border2);
      background: var(--bg4);
    }

    .prob-num {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--bg5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--text3);
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ══════════════════════════════════════
       DIAGNOSTICS
    ══════════════════════════════════════ */

    .block-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 22px;
      transition: border-color .2s;
    }

    .block-card:hover { border-color: var(--border2); }

    .bc-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .bc-icon {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      background: var(--bg5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .bc-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .bc-score-big {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -1px;
    }

    .bc-score-max {
      font-size: 13px;
      color: var(--text4);
      font-weight: 400;
    }

    /* ══════════════════════════════════════
       PROBLEMS
    ══════════════════════════════════════ */

    .prob-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 20px;
      cursor: pointer;
      transition: all .2s;
    }

    .prob-card:hover  { border-color: var(--border2); }
    .prob-card.open   { border-color: var(--border2); }

    .prob-head {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .prob-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      padding-top: 1px;
    }

    .prob-arrow {
      flex-shrink: 0;
      transition: transform .2s;
      color: var(--text4);
      margin-top: 3px;
    }

    .prob-card.open .prob-arrow { transform: rotate(180deg); }

    .prob-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 9px;
      padding-left: 42px;
      flex-wrap: wrap;
    }

    .prob-body {
      display: none;
      padding-top: 18px;
      padding-left: 42px;
    }

    .prob-card.open .prob-body { display: block; }

    .prob-desc {
      font-size: 13px;
      color: var(--text3);
      line-height: 1.75;
      margin-bottom: 14px;
    }

    .info-box {
      border-radius: 9px;
      padding: 13px 15px;
      margin-bottom: 10px;
    }

    .info-box-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 5px;
    }

    .info-box p {
      font-size: 13px;
      line-height: 1.65;
    }

    .ib-danger {
      background: var(--red-dim);
      border: 1px solid rgba(239,68,68,.15);
    }

    .ib-danger .info-box-label { color: var(--red); }
    .ib-danger p { color: var(--text2); }

    .ib-rec {
      background: var(--green-dim);
      border: 1px solid rgba(34,197,94,.15);
    }

    .ib-rec .info-box-label { color: var(--green); }
    .ib-rec p { color: var(--text2); }

    /* ══════════════════════════════════════
       PLAN
    ══════════════════════════════════════ */

    .plan-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 22px;
      display: flex;
      gap: 18px;
      transition: border-color .2s;
      position: relative;
      overflow: hidden;
    }

    .plan-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
    }

    .plan-item.u-critical::before { background: #E07070; }
    .plan-item.u-important::before { background: var(--yellow); }
    .plan-item.u-improve::before { background: var(--text5); }

    .plan-item.u-critical { border-color: rgba(224,112,112,.15); }
    .plan-item.u-current  { border-color: rgba(99,102,241,.3); box-shadow: 0 0 0 1px rgba(99,102,241,.1); }

    .plan-item:hover { border-color: var(--border2); }

    .plan-num {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1.5px solid var(--accent-dim2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 800;
      color: var(--accent);
      flex-shrink: 0;
    }

    .plan-body { flex: 1; min-width: 0; }

    .plan-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 7px;
      letter-spacing: -.2px;
    }

    .plan-desc {
      font-size: 13px;
      color: var(--text3);
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .plan-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .plan-gives-risks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .plan-gr-box {
      border-radius: 8px;
      padding: 12px 13px;
    }

    .plan-gr-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 8px;
    }

    .plan-gr-item {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      font-size: 12px;
      line-height: 1.5;
      margin-bottom: 5px;
    }

    .plan-gr-item:last-child { margin-bottom: 0; }

    .plan-gr-item::before {
      content: '';
      width: 3px;
      height: 3px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px;
    }

    .pgr-gives { background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.12); }
    .pgr-gives .plan-gr-label { color: var(--accent2); }
    .pgr-gives .plan-gr-item { color: var(--text3); }
    .pgr-gives .plan-gr-item::before { background: var(--accent); }

    .pgr-risks { background: rgba(239,68,68,.05); border: 1px solid rgba(239,68,68,.1); }
    .pgr-risks .plan-gr-label { color: rgba(224,112,112,.7); }
    .pgr-risks .plan-gr-item { color: var(--text4); }
    .pgr-risks .plan-gr-item::before { background: #E07070; }

    .urgency-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .ub-critical { background: rgba(224,112,112,.12); color: #E07070; }
    .ub-important{ background: rgba(234,179,8,.1);    color: var(--yellow); }
    .ub-improve  { background: var(--bg5);            color: var(--text4); }

    .plan-intro {
      padding: 16px 20px;
      background: rgba(224,112,112,.04);
      border: 1px solid rgba(224,112,112,.12);
      border-radius: var(--r-sm);
      margin-bottom: 16px;
      font-size: 13px;
      line-height: 1.8;
    }

    .current-step-banner {
      background: rgba(99,102,241,.08);
      border: 1px solid rgba(99,102,241,.2);
      border-radius: var(--r);
      padding: 18px 20px;
      margin-bottom: 20px;
    }

    .csb-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .csb-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      box-shadow: 0 0 8px var(--accent);
    }

    .csb-step-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.2px;
      margin-bottom: 6px;
    }

    .csb-micro-pain {
      font-size: 13px;
      color: rgba(224,112,112,.75);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .csb-micro-pain::before {
      content: '→';
      font-weight: 700;
      color: #E07070;
    }

    .plan-item-first {
      background: var(--bg3);
      border-color: rgba(99,102,241,.2) !important;
    }

    .plan-item-first .plan-title {
      font-size: 16px;
    }

    .plan-item-secondary {
      opacity: .8;
    }

    /* ══════════════════════════════════════
       TASKS — execution dashboard
    ══════════════════════════════════════ */

    .focus-block {
      background: rgba(99,102,241,.07);
      border: 1px solid rgba(99,102,241,.22);
      border-radius: var(--r);
      padding: 20px 22px;
      margin-bottom: 20px;
    }

    .focus-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 12px;
    }

    .focus-task-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.3px;
      margin-bottom: 10px;
    }

    .focus-gives {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 16px;
    }

    .focus-give {
      font-size: 13px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .focus-give::before {
      content: '→';
      color: var(--accent);
      font-weight: 700;
      font-size: 12px;
      flex-shrink: 0;
    }

    .sem-filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .sf-btn {
      padding: 7px 15px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text4);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }

    .sf-btn:hover  { background: var(--bg4); color: var(--text2); }
    .sf-btn.active { background: var(--accent-dim); border-color: var(--accent-dim2); color: var(--accent); }

    .task-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px 20px;
      transition: border-color .2s;
    }

    .task-card:hover   { border-color: var(--border2); }
    .task-card.tc-active { border-color: rgba(99,102,241,.22); }
    .task-card.tc-done   { opacity: .5; }

    .tc-head {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .tc-check {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      border: 1.5px solid var(--border2);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
      transition: all .15s;
    }

    .tc-check.checked     { background: var(--green); border-color: var(--green); }
    .tc-check.in-progress { border-color: var(--accent); background: var(--accent-dim); }

    .tc-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.45;
      flex: 1;
    }

    .tc-title.done { text-decoration: line-through; color: var(--text5); }

    .tc-gives {
      padding: 10px 12px;
      background: var(--bg4);
      border-radius: 7px;
      margin: 0 0 12px 32px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .tc-give {
      font-size: 12px;
      color: var(--text4);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tc-give::before {
      content: '→';
      color: var(--accent);
      font-size: 11px;
      flex-shrink: 0;
      font-weight: 600;
    }

    .tc-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 32px;
      flex-wrap: wrap;
    }

    .tc-section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text5);
      text-transform: uppercase;
      letter-spacing: .6px;
      padding: 14px 0 8px;
    }

    .task-block-tag {
      font-size: 11px;
      color: var(--text4);
      background: var(--bg5);
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }

    /* legacy compat */
    .filter-btn {
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--text4); font-size: 12px; font-weight: 500;
      cursor: pointer; font-family: inherit; transition: all .15s;
    }
    .filter-btn:hover  { background: var(--bg4); color: var(--text2); }
    .filter-btn.active { background: var(--accent-dim); border-color: var(--accent-dim2); color: var(--accent); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text5);
    }

    .empty-state-icon { font-size: 36px; margin-bottom: 12px; }
    .empty-state-text { font-size: 14px; }

    /* ── STEP VIEW ── */

    .step-back-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .step-view-card {
      background: var(--bg3);
      border: 1px solid rgba(99,102,241,.2);
      border-radius: var(--r);
      padding: 22px;
      margin-bottom: 16px;
    }

    .step-view-title {
      font-size: 19px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.4px;
      margin: 12px 0 8px;
    }

    .step-view-desc {
      font-size: 13px;
      color: var(--text3);
      line-height: 1.75;
      margin-bottom: 16px;
    }

    .step-gives-block {
      padding: 14px 16px;
      background: rgba(99,102,241,.06);
      border: 1px solid rgba(99,102,241,.12);
      border-radius: 9px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .step-gives-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 4px;
    }

    .step-give-item {
      font-size: 13px;
      color: var(--text3);
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .step-give-item::before {
      content: '→';
      color: var(--accent);
      font-weight: 700;
      flex-shrink: 0;
    }

    .step-progress-bar {
      margin-top: 14px;
      padding: 12px 14px;
      background: var(--bg4);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .step-progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text4);
      margin-bottom: 8px;
    }

    .step-complete-banner {
      background: rgba(34,197,94,.05);
      border: 1px solid rgba(34,197,94,.2);
      border-radius: var(--r);
      padding: 28px 24px;
      text-align: center;
      margin-bottom: 20px;
    }

    .scb-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(34,197,94,.12);
      border: 1.5px solid rgba(34,197,94,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin: 0 auto 16px;
      color: var(--green);
      font-weight: 700;
    }

    .scb-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--green);
      margin-bottom: 6px;
    }

    .scb-sub {
      font-size: 13px;
      color: var(--text3);
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .step-tasks-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text5);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 10px;
    }

    /* ══════════════════════════════════════
       PROGRESS
    ══════════════════════════════════════ */

    .stat-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 24px 16px;
      text-align: center;
    }

    .stat-num {
      font-size: 38px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -1px;
      margin-bottom: 7px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text4);
    }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */

    @media (max-width: 1100px) {
      .mini-grid { grid-template-columns: repeat(3,1fr); }
      .g5 { grid-template-columns: repeat(3,1fr); }
    }

    @media (max-width: 900px) {
      .g3 { grid-template-columns: repeat(2,1fr); }
      .index-hero { flex-wrap: wrap; gap: 20px; padding: 22px; }
      .ih-actions { width: 100%; }
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
      }

      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .hamburger { display: flex; }
      .content { padding: 16px; }
      .g2 { grid-template-columns: 1fr; }
      .g3 { grid-template-columns: 1fr; }
      .mini-grid { grid-template-columns: repeat(2,1fr); }
      .topbar { padding: 0 16px; }
      .topbar-date { display: none; }
    }

    @media (max-width: 480px) {
      .mini-grid { grid-template-columns: repeat(2,1fr); }
    }

    /* ── DOJIM SYSTEM ── */

    .dojim-banner {
      background: rgba(224,112,112,.05);
      border: 1px solid rgba(224,112,112,.2);
      border-radius: var(--r);
      padding: 20px 22px;
      margin-bottom: 24px;
    }

    .dojim-stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      color: #E07070;
      text-transform: uppercase;
      letter-spacing: .5px;
      background: rgba(224,112,112,.1);
      border: 1px solid rgba(224,112,112,.15);
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 13px;
    }

    .dojim-main {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.3px;
      margin-bottom: 8px;
      line-height: 1.35;
    }

    .dojim-sub {
      font-size: 13px;
      color: var(--text4);
      line-height: 1.8;
      margin-bottom: 16px;
    }

    .dojim-sub span { color: var(--text2); }

    /* Completion toast */
    .completion-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      background: var(--bg3);
      border: 1px solid rgba(34,197,94,.3);
      border-left: 3px solid var(--green);
      border-radius: var(--r);
      padding: 16px 18px;
      min-width: 300px;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5), 0 0 0 1px rgba(34,197,94,.08);
      transform: translateY(120%);
      opacity: 0;
      transition: all .4s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
    }

    .completion-toast.visible {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .ct-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .ct-check-icon {
      width: 22px;
      height: 22px;
      min-width: 22px;
      border-radius: 50%;
      background: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }

    .ct-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
    }

    .ct-effect {
      font-size: 12px;
      color: var(--green);
      line-height: 1.55;
      padding-left: 32px;
      margin-bottom: 4px;
    }

    .ct-next {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .ct-next-label {
      font-size: 11px;
      color: var(--text4);
      flex: 1;
      line-height: 1.4;
    }

    /* Inactivity banner */
    .inactivity-banner {
      position: fixed;
      bottom: 0;
      left: var(--sidebar-w);
      right: 0;
      z-index: 9990;
      background: var(--bg2);
      border-top: 2px solid rgba(224,112,112,.35);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.4,0,.2,1);
    }

    .inactivity-banner.visible {
      transform: translateY(0);
    }

    .ib-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #E07070;
      box-shadow: 0 0 8px #E07070;
      flex-shrink: 0;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .5; transform: scale(.8); }
    }

    .ib-text { flex: 1; }

    .ib-main {
      font-size: 13px;
      font-weight: 700;
      color: #E07070;
      margin-bottom: 1px;
    }

    .ib-sub {
      font-size: 11px;
      color: var(--text5);
    }

    .ib-close {
      background: none;
      border: none;
      color: var(--text5);
      cursor: pointer;
      font-size: 20px;
      padding: 2px 6px;
      line-height: 1;
      transition: color .15s;
    }

    .ib-close:hover { color: var(--text3); }

    @media (max-width: 768px) {
      .inactivity-banner { left: 0; }
      .completion-toast { left: 16px; right: 16px; bottom: 80px; min-width: unset; }
    }
  </style>
</head>

const BLOCK_NAMES = {
  finance: 'Финансы', marketing: 'Маркетинг',
  team: 'Команда', processes: 'Процессы', control: 'Контроль',
};

function scoreInfo(score) {
  if (score < 40) return { label: 'Критично',  cls: 'critical', lpCls: 'lp-critical', fillCls: 'pf-red',    color: 'var(--red)',    badgeCls: 'b-red' };
  if (score < 60) return { label: 'Слабо',     cls: 'weak',     lpCls: 'lp-weak',     fillCls: 'pf-yellow', color: 'var(--yellow)', badgeCls: 'b-yellow' };
  if (score < 75) return { label: 'Умеренно',  cls: 'medium',   lpCls: 'lp-medium',   fillCls: 'pf-blue',   color: 'var(--blue)',   badgeCls: 'b-blue' };
  return           { label: 'Хорошо',    cls: 'good',     lpCls: 'lp-good',     fillCls: 'pf-green',  color: 'var(--green)',  badgeCls: 'b-green' };
}

function critBadge(c) {
  if (c === 'high')   return '<span class="badge b-red">Высокая</span>';
  if (c === 'medium') return '<span class="badge b-yellow">Средняя</span>';
  return '<span class="badge b-green">Низкая</span>';
}

function priBadge(p) {
  if (p === 'high')   return '<span class="badge b-red">Высокий</span>';
  if (p === 'medium') return '<span class="badge b-yellow">Средний</span>';
  return '<span class="badge b-gray">Низкий</span>';
}

function statusBadge(s) {
  if (s === 'done')        return '<span class="badge b-green">Выполнено</span>';
  if (s === 'in_progress') return '<span class="badge b-accent">В работе</span>';
  return '<span class="badge b-gray">Не начато</span>';
}

function blockTag(id) {
  return `<span class="task-block-tag">${BLOCK_NAMES[id] || id}</span>`;
}

function svgCircle(pct, r = 44) {
  const size = r * 2 + 10;
  const cx = size / 2;
  const cy = size / 2;
  const circ = 2 * Math.PI * r;
  const dash = (pct / 100) * circ;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="6"/>
    <g transform="rotate(-90 ${cx} ${cy})">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#6366F1" stroke-width="6"
        stroke-dasharray="${dash.toFixed(1)} ${(circ - dash).toFixed(1)}"
        stroke-linecap="round"/>
    </g>
  </svg>`;
}

function countTasks() {
  const total = DATA.tasks.length;
  const done  = DATA.tasks.filter(t => t.status === 'done').length;
  const inp   = DATA.tasks.filter(t => t.status === 'in_progress').length;
  const todo  = DATA.tasks.filter(t => t.status === 'todo').length;
  return { total, done, inp, todo };
}

// ================================================================

let semFilter  = 'now';
let planFilter = null;
let stepView   = null;

// ── standalone taskCard — used both in general list and step view ──
function taskCard(t) {
  const isDone = t.status === 'done';
  const isActive = t.status === 'in_progress';
  const checkCls = isDone ? 'checked' : isActive ? 'in-progress' : '';
  const checkIcon = isDone
    ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
    : isActive
      ? '<div style="width:5px;height:5px;border-radius:50%;background:var(--accent)"></div>'
      : '';
  return `
    <div class="task-card ${isDone ? 'tc-done' : isActive ? 'tc-active' : ''}">
      <div class="tc-head">
        <button class="tc-check ${checkCls}" onclick="cycleTask(${t.id})">${checkIcon}</button>
        <div class="tc-title ${isDone ? 'done' : ''}">${t.title}</div>
        <span style="font-size:11px;color:var(--text5);white-space:nowrap;margin-top:2px">${t.deadline}</span>
      </div>
      ${!isDone && t.gives ? `
        <div class="tc-gives">
          ${t.gives.map(g => `<div class="tc-give">${g}</div>`).join('')}
        </div>
      ` : ''}
      <div class="tc-footer">
        ${blockTag(t.block)}
        ${isActive
          ? `<span class="badge b-accent">В работе</span>`
          : isDone
            ? `<span class="badge b-green">Выполнено</span>`
            : ''}
        ${!isDone ? `
          <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="cycleTask(${t.id})">
            ${isActive ? 'Завершить →' : 'Начать выполнение →'}
          </button>
        ` : `
          <button class="btn btn-ghost btn-sm" style="margin-left:auto;font-size:11px" onclick="cycleTask(${t.id})">
            Отменить
          </button>
        `}
      </div>
    </div>`;
}

function renderTasks() { renderTasksInner(); }

function renderTasksInner() {
  // Step view takes priority
  if (stepView !== null) { renderStepView(stepView); return; }

  const tc = countTasks();

  const focusTask = DATA.tasks.find(t => t.status === 'in_progress')
    || DATA.tasks.find(t => t.status === 'todo' && t.priority === 'high');

  let pool = planFilter !== null
    ? DATA.tasks.filter(t => t.planId === planFilter)
    : [...DATA.tasks];

  let filtered;
  if      (semFilter === 'now')       filtered = pool.filter(t => t.status === 'in_progress' || (t.status === 'todo' && t.priority === 'high'));
  else if (semFilter === 'important') filtered = pool.filter(t => t.status !== 'done' && t.priority === 'medium');
  else if (semFilter === 'other')     filtered = pool.filter(t => t.status !== 'done' && t.priority === 'low');
  else if (semFilter === 'done')      filtered = pool.filter(t => t.status === 'done');
  else                                filtered = pool;

  const nowCount = DATA.tasks.filter(t => t.status === 'in_progress' || (t.status === 'todo' && t.priority === 'high')).length;
  const impCount = DATA.tasks.filter(t => t.status !== 'done' && t.priority === 'medium').length;
  const othCount = DATA.tasks.filter(t => t.status !== 'done' && t.priority === 'low').length;

  document.getElementById('page-tasks').innerHTML = `
    <div class="pg-head">
      <div class="pg-title">Задачи внедрения</div>
      <div class="pg-sub">
        Вы начали внедрение — но пока задачи не выполнены, результата нет.
        &nbsp;·&nbsp; В работе: <strong style="color:var(--text2)">${tc.inp} из ${tc.total}</strong>
      </div>
    </div>

    ${focusTask && semFilter !== 'done' ? `
      <div class="focus-block">
        <div class="focus-label">🔥 Сделать сейчас</div>
        <div class="focus-task-title">${focusTask.title}</div>
        <div style="font-size:12px;color:var(--text5);margin-bottom:10px">Это самый быстрый способ снизить потери</div>
        ${focusTask.gives ? `
          <div class="focus-gives">
            ${focusTask.gives.map(g => `<div class="focus-give">${g}</div>`).join('')}
          </div>
        ` : ''}
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="cycleTask(${focusTask.id})">
            ${focusTask.status === 'in_progress' ? 'Завершить →' : 'Начать выполнение →'}
          </button>
          ${blockTag(focusTask.block)}
          <span style="font-size:12px;color:var(--text5)">до ${focusTask.deadline}</span>
        </div>
      </div>
    ` : ''}

    <div class="sem-filters">
      <button class="sf-btn ${semFilter === 'now'       ? 'active' : ''}" onclick="setSemFilter('now')">🔥 Сейчас (${nowCount})</button>
      <button class="sf-btn ${semFilter === 'important' ? 'active' : ''}" onclick="setSemFilter('important')">⚠️ Важно (${impCount})</button>
      <button class="sf-btn ${semFilter === 'other'     ? 'active' : ''}" onclick="setSemFilter('other')">Остальное (${othCount})</button>
      <button class="sf-btn ${semFilter === 'done'      ? 'active' : ''}" onclick="setSemFilter('done')">✓ Выполнено (${tc.done})</button>
      <button class="sf-btn ${semFilter === 'all'       ? 'active' : ''}" onclick="setSemFilter('all')">Все (${tc.total})</button>
      ${planFilter !== null ? `<button class="sf-btn active" onclick="clearPlanFilter()" style="margin-left:auto">× Снять фильтр</button>` : ''}
    </div>

    <div class="stack" style="gap:10px">
      ${filtered.length === 0
        ? `<div class="empty-state"><div class="empty-state-icon">✓</div><div class="empty-state-text">Нет задач в этой категории</div></div>`
        : filtered.map(t => taskCard(t)).join('')}
    </div>
  `;
}

function setSemFilter(f) {
  semFilter = f;
  renderTasksInner();
}

function clearPlanFilter() {
  planFilter = null;
  renderTasksInner();
}

function cycleTask(id) {
  const task = DATA.tasks.find(t => t.id === id);
  if (!task) return;

  const wasFirstStart = task.status === 'todo'
    && DATA.tasks.every(t => t.status === 'todo');

  const cycle = { todo: 'in_progress', in_progress: 'done', done: 'todo' };
  task.status = cycle[task.status];

  if (task.status === 'in_progress' && wasFirstStart) {
    track('first_task_started', { taskId: task.id, taskTitle: task.title, planId: task.planId });
  }

  if (task.status === 'done') {
    track('task_completed', { taskId: task.id, taskTitle: task.title, planId: task.planId });
    showCompletionToast(task);

    // Check if the step is now fully done
    const step = DATA.plan.find(p => p.id === task.planId);
    if (step) {
      const allStepDone = step.taskIds.every(
        tid => DATA.tasks.find(t => t.id === tid)?.status === 'done'
      );
      if (allStepDone) {
        const nextStep = DATA.plan.find(p => p.priority === step.priority + 1);
        track('step_completed', {
          planId: step.id,
          stepTitle: step.title,
          stepPriority: step.priority,
          nextStepId: nextStep?.id ?? null,
          nextStepTitle: nextStep?.title ?? null,
        });
      }
    }
  }

  resetInactivity();
  renderTasksInner();
  updateBadges();
  if (document.getElementById('page-plan').classList.contains('active')) renderPlan();
}

// ── COMPLETION TOAST ──
function showCompletionToast(task) {
  const toast    = document.getElementById('completion-toast');
  const titleEl  = document.getElementById('ct-title');
  const effectEl = document.getElementById('ct-effect');
  const nextEl   = document.getElementById('ct-next');
  const nextLabel= document.getElementById('ct-next-label');
  const nextBtn  = document.getElementById('ct-next-btn');

  // Shorten title if too long
  const shortTitle = task.title.length > 40 ? task.title.slice(0, 38) + '…' : task.title;
  titleEl.textContent = 'Сделано: ' + shortTitle;
  effectEl.textContent = task.gives && task.gives[0] ? '→ ' + task.gives[0] : '';

  // Find next task in the same step
  const step = DATA.plan.find(p => p.id === task.planId);
  const nextTask = step
    ? DATA.tasks.find(t => step.taskIds.includes(t.id) && t.status !== 'done' && t.id !== task.id)
    : null;

  if (nextTask) {
    nextEl.style.display = 'flex';
    nextLabel.textContent = nextTask.title;
    nextBtn.onclick = () => { hideCompletionToast(); cycleTask(nextTask.id); };
  } else {
    nextEl.style.display = 'none';
  }

  toast.classList.add('visible');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(hideCompletionToast, 5000);
}

function hideCompletionToast() {
  document.getElementById('completion-toast').classList.remove('visible');
}

// ================================================================
//  EVENT TRACKING  — connect to backend to trigger Telegram/push
// ================================================================
//
//  track(event, payload) fires at every product moment.
//  In production: replace the console.log with a fetch() call to
//  your backend, which looks up the user's Telegram chat_id and
//  sends the appropriate message via Bot API.
//
//  Events emitted by this module:
//    platform_opened          — user opened the platform (session start)
//    page_viewed              — user navigated to a page
//    first_task_started       — first task ever moved to in_progress
//    task_completed           — any task moved to done
//    step_completed           — all tasks in a plan step are done
//    inactivity_dismissed     — user clicked "Продолжить" on inactivity banner
//    goToTasks_clicked        — user clicked "Начать внедрение" on a step
//
//  Backend side should implement the scheduling logic:
//    +0h   roadmap_received  → send MSG_START_1
//    +24h  no platform_opened → send MSG_START_NO_LOGIN
//    +24h  platform_opened but no first_task_started → send MSG_NO_TASKS
//    +72h  still no first_task_started → send MSG_NO_TASKS_2
//    +3d   first_task_started but no task_completed → send MSG_STALLED
//    +7d   idle (no events) → send MSG_IDLE_LONG
//    task_completed → send MSG_REINFORCEMENT (within 30 min)
//    step_completed → send MSG_STEP_DONE (immediately)
//    trial -3d → send MSG_TRIAL_3D
//    trial -1d → send MSG_TRIAL_1D

function track(event, payload = {}) {
  const tc = countTasks();
  const stepsClosedCnt = DATA.plan.filter(step =>
    step.taskIds.every(tid => DATA.tasks.find(t => t.id === tid)?.status === 'done')
  ).length;

  const enriched = {
    event,
    userId:    DATA.user.firstName + '_' + DATA.user.lastName, // replace with real ID
    userName:  DATA.user.firstName,
    company:   DATA.user.company,
    ts:        new Date().toISOString(),
    state: {
      tasksTotal:      tc.total,
      tasksDone:       tc.done,
      tasksInProgress: tc.inp,
      tasksTodo:       tc.todo,
      stepsTotal:      DATA.plan.length,
      stepsClosed:     stepsClosedCnt,
      pctComplete:     Math.round((tc.done / tc.total) * 100),
    },
    ...payload,
  };

  // Dev: log to console
  console.log('[K-AQS track]', enriched.event, enriched);

  // Prod: uncomment and point to your backend
  // fetch('/api/track', {
  //   method: 'POST',
  //   headers: { 'Content-Type': 'application/json' },
  //   body: JSON.stringify(enriched),
  //   keepalive: true,
  // }).catch(() => {});
}

// ── INACTIVITY DETECTION ──
let _inactivityTimer = null;
const INACTIVITY_MS  = 50000; // 50 seconds without interaction

function resetInactivity() {
  clearTimeout(_inactivityTimer);
  closeInactivityBanner();
  _inactivityTimer = setTimeout(showInactivityBanner, INACTIVITY_MS);
}

function showInactivityBanner() {
  document.getElementById('inactivity-banner').classList.add('visible');
}

function closeInactivityBanner() {
  document.getElementById('inactivity-banner').classList.remove('visible');
}

function dismissInactivity() {
  track('inactivity_dismissed');
  closeInactivityBanner();
  resetInactivity();
  const currentStep = DATA.plan.find(item => {
    const done = DATA.tasks.filter(t => item.taskIds.includes(t.id) && t.status === 'done').length;
    return done < item.taskIds.length;
  });
  if (currentStep) goToTasks(currentStep.id);
  else navigate('progress');
}

// Opens a focused view for a specific plan step
function goToTasks(planId) {
  track('goToTasks_clicked', { planId, stepTitle: DATA.plan.find(p => p.id === planId)?.title });
  stepView = planId;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-tasks').classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n =>
    n.classList.toggle('active', n.dataset.page === 'tasks'));
  document.querySelector('.content').scrollTop = 0;
  const step = DATA.plan.find(p => p.id === planId);
  document.getElementById('topbar-title').textContent = step ? step.title : 'Внедрение';
  renderStepView(planId);
  closeSidebar();
}

function exitStepView() {
  stepView = null;
  navigate('plan');
}

// ── Focused step task view ──
function renderStepView(planId) {
  const step = DATA.plan.find(p => p.id === planId);
  if (!step) { stepView = null; renderTasksInner(); return; }

  const stepTasks = DATA.tasks.filter(t => step.taskIds.includes(t.id));
  const doneCnt   = stepTasks.filter(t => t.status === 'done').length;
  const totalCnt  = stepTasks.length;
  const allDone   = doneCnt === totalCnt;
  const pct       = Math.round((doneCnt / totalCnt) * 100);

  const focusTask = stepTasks.find(t => t.status === 'in_progress')
    || stepTasks.find(t => t.status === 'todo');
  const nextStep  = DATA.plan.find(p => p.priority === step.priority + 1);

  const progressText = allDone
    ? 'Шаг полностью выполнен'
    : doneCnt > 0
      ? `${doneCnt} из ${totalCnt} задач · процесс в работе`
      : `0 из ${totalCnt} задач · не начато · процесс не стабилен`;

  const urgencyMeta = {
    critical: { badge: 'ub-critical', label: '🔥 КРИТИЧНО' },
    important: { badge: 'ub-important', label: '⚠️ ВАЖНО' },
    improve:  { badge: 'ub-improve',  label: '🟡 ДОРАБОТАТЬ' },
  };
  const um = urgencyMeta[step.urgency] || urgencyMeta.improve;

  document.getElementById('topbar-title').textContent = step.title;
  document.getElementById('page-tasks').innerHTML = `
    <div class="step-back-bar">
      <button class="btn btn-ghost btn-sm" onclick="exitStepView()">← К плану действий</button>
      <span class="badge b-gray">${BLOCK_NAMES[step.block]}</span>
      <span class="badge b-gray" style="margin-left:auto">Шаг ${step.priority} из ${DATA.plan.length}</span>
    </div>

    <div class="step-view-card">
      <span class="urgency-badge ${um.badge}">${um.label}</span>
      <div class="step-view-title">${step.title}</div>
      <p class="step-view-desc">${step.desc}</p>
      <div class="step-gives-block">
        <div class="step-gives-label">Что даст этот шаг</div>
        ${step.gives.map(g => `<div class="step-give-item">${g}</div>`).join('')}
      </div>
      <div class="step-progress-bar">
        <div class="step-progress-label">
          <span>${progressText}</span>
          <span style="color:${allDone ? 'var(--green)' : 'var(--text3)'};font-weight:600">${pct}%</span>
        </div>
        <div class="pbar-track" style="height:5px">
          <div class="pbar-fill ${allDone ? 'pf-green' : 'pf-accent'}" style="width:${pct}%"></div>
        </div>
      </div>
    </div>

    ${allDone ? `
      <div class="step-complete-banner">
        <div class="scb-icon">✓</div>
        <div class="scb-title">Шаг выполнен</div>
        <div class="scb-sub">Вы закрыли "${step.title}".<br>Бизнес стал управляемее на один шаг.</div>
        ${nextStep ? `
          <button class="btn btn-primary" onclick="goToTasks(${nextStep.id})">
            Следующий шаг: ${nextStep.title} →
          </button>
        ` : `
          <button class="btn btn-primary" onclick="navigate('progress')">
            Посмотреть итоговый прогресс →
          </button>
        `}
      </div>
    ` : focusTask ? `
      <div class="focus-block">
        <div class="focus-label">🔥 Приоритет прямо сейчас</div>
        <div class="focus-task-title">${focusTask.title}</div>
        <div style="font-size:12px;color:var(--text5);margin-bottom:10px">Это самый быстрый способ снизить потери</div>
        ${focusTask.gives ? `
          <div class="focus-gives">
            ${focusTask.gives.map(g => `<div class="focus-give">${g}</div>`).join('')}
          </div>
        ` : ''}
        <button class="btn btn-primary" onclick="cycleTask(${focusTask.id})">
          ${focusTask.status === 'in_progress' ? 'Завершить →' : 'Начать выполнение →'}
        </button>
      </div>
    ` : ''}

    <div class="step-tasks-label">Задачи этого шага</div>
    <div class="stack" style="gap:10px">
      ${stepTasks.map(t => taskCard(t)).join('')}
    </div>

    <div style="margin-top:20px;padding:14px 18px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);display:flex;align-items:center;justify-content:space-between;gap:12px">
      <button class="btn btn-ghost btn-sm" onclick="exitStepView()">← Назад к плану</button>
      <button class="btn btn-ghost btn-sm" onclick="navigate('progress')">Прогресс →</button>
    </div>
  `;
}

// ================================================================
//  RENDER: PROGRESS
// ================================================================

function renderProgress() {
  const tc  = countTasks();
  const pct = Math.round((tc.done / tc.total) * 100);
  const lvl = pct < 25 ? 'Только начали' : pct < 50 ? 'Набираем темп' : pct < 75 ? 'Хорошо идёт' : 'Финишная прямая';
  const lvlCls = pct < 25 ? 'lp-critical' : pct < 50 ? 'lp-weak' : pct < 75 ? 'lp-medium' : 'lp-good';

  // Step-level progress
  const stepProgress = DATA.plan.map(step => {
    const sTasks = DATA.tasks.filter(t => step.taskIds.includes(t.id));
    const sDone  = sTasks.filter(t => t.status === 'done').length;
    const sTotal = sTasks.length;
    const sPct   = sTotal ? Math.round((sDone / sTotal) * 100) : 0;
    const isDone = sDone === sTotal;
    const statusText = isDone
      ? 'Завершён'
      : sDone > 0
        ? `${sDone} из ${sTotal} задач · в работе`
        : `Не начат · ${sTotal} задач`;
    return { ...step, sDone, sTotal, sPct, isDone, statusText };
  });
  const stepsClosedCnt = stepProgress.filter(s => s.isDone).length;
  const stepsTotal     = DATA.plan.length;

  // Next active step
  const nextActiveStep = stepProgress.find(s => !s.isDone);

  document.getElementById('page-progress').innerHTML = `
    <div class="pg-head">
      <div class="pg-title">Прогресс</div>
      <div class="pg-sub">
        ${stepsClosedCnt === 0
          ? 'Внедрение ещё не начато — проблемы бизнеса остаются открытыми'
          : stepsClosedCnt < stepsTotal
            ? `Устранено ${stepsClosedCnt} из ${stepsTotal} проблем — система ещё не внедрена`
            : 'Все проблемы устранены — бизнес стал управляемым'}
      </div>
    </div>

    <div class="index-hero mb24">
      <div class="ih-circle">
        ${svgCircle(pct, 46)}
        <div class="ih-circle-val">
          <div class="ih-num">${pct}%</div>
          <div class="ih-max">план</div>
        </div>
      </div>
      <div class="ih-info">
        <div class="level-pill ${lvlCls}">● ${lvl}</div>
        <h2>Вы устранили ${stepsClosedCnt} из ${stepsTotal} проблем</h2>
        <p>${stepsTotal - stepsClosedCnt > 0
          ? `Ещё <strong style="color:#E07070">${stepsTotal - stepsClosedCnt} проблем</strong> остаются открытыми.
             Потери продолжаются. Каждый выполненный шаг закрывает одну системную причину.`
          : 'Все системные проблемы устранены. Бизнес работает без постоянного участия собственника.'}
        </p>
      </div>
    </div>

    <div class="g3 mb24">
      <div class="stat-card">
        <div class="stat-num" style="color:var(--green)">${stepsClosedCnt}</div>
        <div class="stat-label">проблем устранено</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:${stepsTotal - stepsClosedCnt > 0 ? '#E07070' : 'var(--green)'}">${stepsTotal - stepsClosedCnt}</div>
        <div class="stat-label">проблем остаётся</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--accent)">${tc.done}</div>
        <div class="stat-label">из ${tc.total} задач сделано</div>
      </div>
    </div>

    ${nextActiveStep ? `
      <div class="current-step-banner" style="margin-bottom:20px">
        <div class="csb-top">
          <div class="csb-dot"></div>
          <span style="font-size:10px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:.7px">Следующий шаг</span>
        </div>
        <div class="csb-step-title">${nextActiveStep.title}</div>
        <div style="font-size:12px;color:var(--text4);margin-bottom:14px">${nextActiveStep.statusText}</div>
        <button class="btn btn-primary" onclick="goToTasks(${nextActiveStep.id})">
          Продолжить внедрение →
        </button>
      </div>
    ` : ''}

    <div class="sec-head">
      <div class="sec-title">Прогресс по шагам</div>
    </div>

    <div class="stack" style="gap:10px;margin-bottom:24px">
      ${stepProgress.map(s => `
        <div class="card card-sm" style="${s.isDone ? 'border-color:rgba(34,197,94,.2);opacity:.8' : ''}">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
            <div style="width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;
              background:${s.isDone ? 'rgba(34,197,94,.15)' : 'var(--accent-dim)'};
              color:${s.isDone ? 'var(--green)' : 'var(--accent)'};
              border:1.5px solid ${s.isDone ? 'rgba(34,197,94,.3)' : 'var(--accent-dim2)'}">
              ${s.isDone ? '✓' : s.priority}
            </div>
            <div class="flex-1">
              <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
                <span style="font-size:13px;font-weight:600;color:var(--text)">${s.title}</span>
                <span style="font-size:11px;color:${s.isDone ? 'var(--green)' : 'var(--text4)'};white-space:nowrap">${s.statusText}</span>
              </div>
            </div>
          </div>
          <div class="pbar-track" style="height:4px;margin-bottom:6px">
            <div class="pbar-fill ${s.isDone ? 'pf-green' : 'pf-accent'}" style="width:${s.sPct}%"></div>
          </div>
          ${!s.isDone ? `
            <div style="margin-top:8px;text-align:right">
              <button class="btn btn-ghost btn-sm" onclick="goToTasks(${s.id})">
                ${s.sDone > 0 ? 'Продолжить' : 'Начать'} →
              </button>
            </div>
          ` : ''}
        </div>
      `).join('')}
    </div>

    <div class="card" style="text-align:center;border-color:var(--accent-dim2);padding:28px">
      <div style="font-size:12px;color:var(--text4);margin-bottom:6px">Текущий индекс управляемости</div>
      <div style="font-size:48px;font-weight:800;color:var(--accent);letter-spacing:-2px;line-height:1">${DATA.index}</div>
      <div style="font-size:12px;color:var(--text5);margin-top:6px">Вырастет после закрытия шагов</div>
      <div class="mt16">
        <button class="btn btn-primary" onclick="navigate('plan')">
          К плану действий →
        </button>
      </div>
    </div>
  `;
}

// ================================================================
//  NAVIGATION
// ================================================================

const PAGE_TITLES = {
  dashboard:   'Главная',
  diagnostics: 'Диагностика',
  problems:    'Проблемные зоны',
  plan:        'План действий',
  tasks:       'Задачи',
  progress:    'Прогресс',
};

const RENDERERS = {
  dashboard:   renderDashboard,
  diagnostics: renderDiagnostics,
  problems:    renderProblems,
  plan:        renderPlan,
  tasks:       renderTasksInner,
  progress:    renderProgress,
};

function navigate(pageId) {
  // Sidebar nav to tasks always shows the full list, not a step view
  if (pageId === 'tasks') stepView = null;

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById('page-' + pageId);
  if (target) target.classList.add('active');

  document.querySelectorAll('.nav-item').forEach(n =>
    n.classList.toggle('active', n.dataset.page === pageId));

  document.getElementById('topbar-title').textContent = PAGE_TITLES[pageId] || '';
  document.querySelector('.content').scrollTop = 0;

  if (RENDERERS[pageId]) RENDERERS[pageId]();

  closeSidebar();
}

function updateBadges() {
  const tc = countTasks();
  const el = document.getElementById('nb-tasks');
  if (el) el.textContent = tc.inp + tc.todo;
}

// ================================================================
//  SIDEBAR MOBILE
// ================================================================

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ================================================================
//  INIT
// ================================================================

function init() {
  // Inject user data
  document.getElementById('sb-name').textContent     = DATA.user.firstName + ' ' + DATA.user.lastName;
  document.getElementById('sb-meta').textContent     = DATA.user.company + ' · ' + DATA.user.role;
  document.getElementById('sb-index').textContent    = DATA.index;
  document.getElementById('topbar-avatar').textContent = DATA.user.initials;

  // Date
  const now = new Date();
  document.getElementById('topbar-date').textContent =
    now.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });

  // Nav click handlers
  document.querySelectorAll('.nav-item[data-page]').forEach(item => {
    item.addEventListener('click', () => { resetInactivity(); navigate(item.dataset.page); });
  });

  // Inactivity tracking — reset on any interaction
  ['click', 'keydown', 'touchstart', 'scroll'].forEach(ev =>
    document.addEventListener(ev, resetInactivity, { passive: true })
  );

  // Initial render
  renderDashboard();
  updateBadges();
  resetInactivity();

  // Track session start — backend checks if this is first open, nth open, etc.
  track('platform_opened');
}

document.addEventListener('DOMContentLoaded', init);
</script>
